<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login FISLAB II</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwindConfig = {
        darkMode: 'class'
      }
    </script>
</head>
<body class="login-body">

    <div class="loading-screen" id="loading-screen">
        <div class="loading-content">
            <img id="loading-avatar" src="Epstein Files/Eins1.png" alt="Loading avatar" width="200" height="200">
            <div class="loading-bar-container" aria-hidden="true">
                <div class="loading-bar-fill" id="progress-bar" style="width:0%"></div>
            </div>
            <div id="loading-text" class="progress-text">Memuat... <span id="progress-text">0%</span></div>
        </div>
    </div>

    <header class="top-left-header" aria-label="Brand header">
        <span class="header-logo">Φ</span>
        <span class="header-text">FISLAB II</span>
    </header>
    <div class="top-border-box" aria-hidden="true"></div>
    <button id="mode-toggle" class="mode-toggle" type="button" aria-label="Toggle night mode">
        <svg class="icon sun-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon moon-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>

    <!-- Hero Component -->
    <div id="background-paths-wrapper" class="relative min-h-screen w-full flex items-center justify-center overflow-hidden bg-white dark:bg-neutral-950">
        
        <div id="floating-paths-container" class="absolute inset-0 pointer-events-none"></div>

        <div class="relative z-10 container mx-auto px-4 md:px-6 text-center">
            <div id="hero-content" class="max-w-4xl mx-auto opacity-0 transition-opacity duration-1000 ease-in-out">
                <h1 id="hero-title" class="text-5xl sm:text-7xl md:text-8xl font-bold mb-8 tracking-tighter">
                </h1>

                <div class="inline-block group relative bg-gradient-to-b from-black/10 to-white/10 dark:from-white/10 dark:to-black/10 p-px rounded-2xl backdrop-blur-lg overflow-hidden shadow-lg hover:shadow-xl transition-shadow duration-300">
                    <button id="hero-login-btn" class="inline-flex items-center justify-center whitespace-nowrap rounded-[1.15rem] px-8 py-6 text-lg font-semibold backdrop-blur-md bg-white/95 hover:bg-white/100 dark:bg-black/95 dark:hover:bg-black/100 text-black dark:text-white transition-all duration-300 group-hover:-translate-y-0.5 border border-black/10 dark:border-white/10 hover:shadow-md dark:hover:shadow-neutral-800/50 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-neutral-400">
                        <span class="opacity-90 group-hover:opacity-100 transition-opacity">
                            Masuk
                        </span>
                        <span class="ml-3 opacity-70 group-hover:opacity-100 group-hover:translate-x-1.5 transition-all duration-300">
                            &rarr;
                        </span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal-overlay" class="fixed inset-0 bg-black/50 z-40 hidden opacity-0 transition-opacity duration-300 pointer-events-none">
    </div>

    <div id="login-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden scale-95 opacity-0 transition-all duration-300 pointer-events-none">
        <div class="bg-white dark:bg-neutral-900 rounded-2xl shadow-2xl max-w-md w-full p-8 relative">
            <button id="close-login-modal" class="absolute top-4 right-4 text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>

            <div class="mb-6">
                <h2 class="text-3xl font-bold text-center mb-2 text-black dark:text-white">Login FISLAB II</h2>
                <p class="text-center text-gray-600 dark:text-gray-400 text-sm">Masukkan NRP dan kata sandi Anda</p>
            </div>

            <form id="login-form-modal" method="POST" class="space-y-4">
                <div class="form-group">
                    <label for="nrp-modal" class="block font-semibold mb-2 text-gray-800 dark:text-gray-200">NRP</label>
                    <input type="text" id="nrp-modal" name="nrp" placeholder="Masukkan NRP Anda" class="w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-neutral-800 text-black dark:text-white focus:outline-none focus:border-blue-500 dark:focus:border-blue-400 transition-colors" required>
                </div>

                <div class="form-group">
                    <label for="password-modal" class="block font-semibold mb-2 text-gray-800 dark:text-gray-200">Kata Sandi</label>
                    <div class="relative">
                        <input type="password" id="password-modal" name="password" placeholder="Masukkan kata sandi Anda" class="w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-neutral-800 text-black dark:text-white focus:outline-none focus:border-blue-500 dark:focus:border-blue-400 transition-colors pr-12" required>
                        <button type="button" id="toggle-password-modal" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300 transition-colors" aria-label="Toggle password visibility">
                            <svg class="eye-icon w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            <svg class="eye-off-icon w-5 h-5 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.94 10.94 0 0112 20c-7 0-11-8-11-8a18.1 18.1 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.1 18.1 0 01-5.07 5.93m0 0A9.12 9.12 0 015.13 5.13"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 dark:bg-blue-600 dark:hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors">
                    Login
                </button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="firebase-config.js"></script>
    <script src="sidebar.js"></script>
    <script src="js/hero.js"></script>
    <script src="index.js"></script>
</body>

</html>
